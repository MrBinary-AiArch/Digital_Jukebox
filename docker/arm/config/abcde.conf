# -----------------$HOME/.abcde.conf----------------- #
# Optimized for Digital Jukebox - FLAC Ripping
# -------------------------------------------------- #

# ENCODE OUTPUT FORMAT
OUTPUTTYPE=flac

# KEEP OUTPUT?
KEEPWAVOUTPUT=n

# TRACK PADDING (01 instead of 1)
PADTRACKS=y

# OUTPUT FILE NAMING
# Result: /Artist/Album/01 - Song Title.flac
OUTPUTFORMAT='${ARTISTFILE}/${ALBUMFILE}_${DISCID}_$(date +%Y%m%d_%H%M%S)/${TRACKNUM} - ${TRACKFILE}'

# VARIOUS ARTIST FILE NAMING
VAOUTPUTFORMAT='Various-${ALBUMFILE}_${DISCID}_$(date +%Y%m%d_%H%M%S)/${TRACKNUM} - ${ARTISTFILE} - ${TRACKFILE}'

# SPACES IN FILENAMES (y = keep spaces)
mungefilename=n

# FLAC ENCODING OPTIONS
FLACOPTS='--verify'

# ALBUM ART (y = download and embed)
getalbumart=y
embedalbumart=y

# ACTIONS TO TAKE
ACTIONS=cddb,read,encode,tag,move,clean,getalbumart,embedalbumart

# CD DRIVE SPEED (0 = max speed)
READSPEED=0

# CDPARANOIA OPTIONS (-d = Standard Paranoia)
CDROMREADOPTS="-d"

# CD LOOKUP METHOD
CDDBMETHOD=musicbrainz,cddb

# INTERACTION (n = No prompts, essential for Zero-Touch)
INTERACTIVE=n

# EJECT (n = Handled by ARM)
EJECTCD=n

# OUTPUT DIRECTORY (Matches ARM internal mapping)
OUTPUTDIR="/home/arm/music/library"

# Custom logic for unidentified albums (Conflict Prevention)
if [ -z "$ALBUMFILE" ] || [ "$ALBUMFILE" = "unknown_album" ] || [ "$ALBUMFILE" = "Unknown_Album" ]; then
    ALBUMFILE="Unknown_Album_$(date +%Y%m%d_%H%M%S)"
fi
