services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - ./config:/config
      - /mnt/storage/music/ingest:/ingest
      - /mnt/storage/music/library:/music
    ports:
      - 8686:8686
    restart: unless-stopped
